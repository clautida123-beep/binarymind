<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperConnect — Téléphonie Interne</title>
<link rel="icon" type="image/png" href="image/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/Caissier/main.css">
</head>
<body>

  <!--- Affichage de page -->
  
<div class="bg-scene"></div>
<div class="grid-overlay"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div> 

  <!-- Contenaire-->
 <div class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013 5.18 2 2 0 015 3h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L9.09 10.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </div>
      <span class="brand-name">SuperConnect</span>
      <span class="brand-tag">Interne</span>
    </div>

    <h1 class="card-title">Bonne journée,<br>qui êtes-vous ?</h1>
    <p class="card-sub">Système de téléphonie interne — Supermarché</p>

    <div class="field-label">Votre poste</div>
    <div class="roles" id="roles">
      <button class="role-btn" data-role="caissier" onclick="selectRole(this)">
        <span class="role-icon">🛒</span> Caissier·ère
        <span class="check"></span>
      </button>
      <button class="role-btn" data-role="comptable" onclick="selectRole(this)">
        <span class="role-icon">📊</span> Comptable
        <span class="check"></span>
      </button>
      <button class="role-btn" data-role="manager" onclick="selectRole(this)">
        <span class="role-icon">👔</span> Manager
        <span class="check"></span>
      </button>
      <button class="role-btn" data-role="securite" onclick="selectRole(this)">
        <span class="role-icon">🔒</span> Sécurité
        <span class="check"></span>
      </button>
      <button class="role-btn" data-role="logistique" style="grid-column: span 2" onclick="selectRole(this)">
        <span class="role-icon">📦</span> Logistique
        <span class="check"></span>
      </button>
    </div>

    <div class="field-label">Mot de passe</div>
    <div class="pw-wrap">
      <input
        class="pw-input"
        id="pw"
        type="password"
        placeholder="Entrez votre mot de passe"
        autocomplete="off"
        oninput="clearError(); document.getElementById('toggle-btn').classList.toggle('visible', this.value.length > 0);"
        onkeydown="if(event.key==='Enter') connect()"
      />
      <button class="pw-toggle" id="toggle-btn" onclick="togglePw()" type="button" aria-label="Afficher/Masquer">
        <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
      <div class="error-msg" id="err">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="err-text">Mot de passe incorrect</span>
      </div>
    </div>

    <button class="btn-connect" id="btn" onclick="connect()">
      <span class="btn-ripple"></span>
      Se connecter
    </button>

    <div class="divider"><span>Système sécurisé</span></div>

    <div class="footer-info">
      <div class="footer-dot"></div>
      Réseau interne actif · v2.4.1
    </div>

  </div>
</div> 

  <!-- Success screen -->
 <div class="success-overlay" id="success">
  <div class="success-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="success-title" id="success-title">Connexion réussie !</div>
  <div class="success-sub" id="success-sub">Bienvenue, chargement en cours…</div>
</div> 



<script src="/Caissier/main.js"></script>
</body>
</html>
